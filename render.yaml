# Render.com blueprint for the Django backend.
# Deploy: push to GitHub, then "New +" -> "Blueprint" -> pick this repo.
services:
  - type: web
    name: truck-routing-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    healthCheckPath: /api/v1/health/
    envVars:
      - key: GRAPHHOPPER_API_KEY
        sync: false            # set your GraphHopper key in the dashboard
      - key: GRAPHHOPPER_PROFILE
        value: "car"
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_ALLOWED_HOSTS
        value: ".onrender.com"
      - key: CORS_ALLOWED_ORIGINS
        sync: false            # set to your Vercel frontend URL
